StylesPath = .vale/styles
MinAlertLevel = suggestion
Vocab = safe

[*.{md,mdx}]
BasedOnStyles = Vale

# Ignore tokens that commonly trigger false positives in docs.
# - Markdown links: [text](url)
# - Raw URLs: https://example.com
# - Email addresses: user@example.com
TokenIgnores = \
  \[[^\]]+\]\([^\)]+\) |  # markdown links
  https?://\S+        |   # URLs
  \S+@\S+                 # email addresses
